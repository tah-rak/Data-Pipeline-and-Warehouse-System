services:
  # ============================================================
  # MESSAGE BROKER
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    labels:
      com.pipeline.component: "zookeeper"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      zookeeper:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.pipeline.component: "kafka"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  # ============================================================
  # DATABASES
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.pipeline.component: "mysql"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_warehouse.sql:/docker-entrypoint-initdb.d/init_warehouse.sql:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      com.pipeline.component: "postgres"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.pipeline.component: "redis"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  mongodb:
    image: mongo:6.0.13
    container_name: mongodb
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    labels:
      com.pipeline.component: "mongodb"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  # ============================================================
  # OBJECT STORAGE
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    labels:
      com.pipeline.component: "minio"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/raw-data;
      mc mb --ignore-existing local/processed-data;
      echo 'MinIO buckets initialized.';
      "
    restart: "no"
    labels:
      com.pipeline.component: "minio-init"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  # ============================================================
  # APACHE AIRFLOW
  # ============================================================
  airflow-init:
    build: ./airflow
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username $${AIRFLOW_ADMIN_USER:-admin}
        --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@pipeline.local || true &&
      airflow connections add mysql_default
        --conn-type mysql
        --conn-host mysql
        --conn-port 3306
        --conn-login $${MYSQL_USER}
        --conn-password $${MYSQL_PASSWORD}
        --conn-schema $${MYSQL_DATABASE} || true &&
      airflow connections add postgres_default
        --conn-type postgres
        --conn-host postgres
        --conn-port 5432
        --conn-login $${POSTGRES_USER}
        --conn-password $${POSTGRES_PASSWORD}
        --conn-schema $${POSTGRES_DB} || true &&
      echo 'Airflow initialization complete.'
      "
    restart: "no"
    labels:
      com.pipeline.component: "airflow-init"
      com.pipeline.tier: "orchestration"
    networks:
      - pipeline-network

  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    command: airflow webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./great_expectations:/opt/airflow/great_expectations:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    labels:
      com.pipeline.component: "airflow-webserver"
      com.pipeline.tier: "orchestration"
    networks:
      - pipeline-network

  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: airflow scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./great_expectations:/opt/airflow/great_expectations:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    labels:
      com.pipeline.component: "airflow-scheduler"
      com.pipeline.tier: "orchestration"
    networks:
      - pipeline-network

  # ============================================================
  # APACHE SPARK
  # ============================================================
  spark-master:
    build: ./spark
    container_name: spark-master
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark:/opt/spark_jobs
      - ./great_expectations:/opt/spark_jobs/great_expectations:ro
      - spark_checkpoints:/opt/spark_checkpoints
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.pipeline.component: "spark-master"
      com.pipeline.tier: "processing"
    networks:
      - pipeline-network

  spark-worker:
    build: ./spark
    container_name: spark-worker
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      spark-master:
        condition: service_healthy
    env_file: .env
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_NO_DAEMONIZE: "true"
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    volumes:
      - ./spark:/opt/spark_jobs
      - ./great_expectations:/opt/spark_jobs/great_expectations:ro
      - spark_checkpoints:/opt/spark_checkpoints
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[s]park.worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.pipeline.component: "spark-worker"
      com.pipeline.tier: "processing"
    networks:
      - pipeline-network

  kafka-producer:
    build: ./kafka
    container_name: kafka-producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: sensor_readings
      MESSAGE_FREQUENCY: "2"
      BATCH_SIZE: "10"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[p]roducer.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.pipeline.component: "kafka-producer"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  # ============================================================
  # ML & TIME-SERIES
  # ============================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: mlflow
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://processed-data/mlflow-artifacts
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        --default-artifact-root s3://processed-data/mlflow-artifacts
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      com.pipeline.component: "mlflow"
      com.pipeline.tier: "ml"
    networks:
      - pipeline-network

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_TOKEN:-pipeline-influx-token}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-pipeline-org}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-iot_data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-pipeline-influx-token}
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    labels:
      com.pipeline.component: "influxdb"
      com.pipeline.tier: "data"
    networks:
      - pipeline-network

  # ============================================================
  # MONITORING
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
    labels:
      com.pipeline.component: "prometheus"
      com.pipeline.tier: "monitoring"
    networks:
      - pipeline-network

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      prometheus:
        condition: service_healthy
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      com.pipeline.component: "grafana"
      com.pipeline.tier: "monitoring"
    networks:
      - pipeline-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.pipeline.component: "elasticsearch"
      com.pipeline.tier: "monitoring"
    networks:
      - pipeline-network

  # ============================================================
  # .NET BACKEND API
  # ============================================================
  dotnet-api:
    build: ./sample_dotnet_backend
    container_name: dotnet-api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
    ports:
      - "5000:80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.pipeline.component: "dotnet-api"
      com.pipeline.tier: "api"
    networks:
      - pipeline-network

# ============================================================
# NETWORKS
# ============================================================
networks:
  pipeline-network:
    driver: bridge
    name: pipeline-network

# ============================================================
# VOLUMES
# ============================================================
volumes:
  mysql_data:
  postgres_data:
  redis_data:
  mongodb_data:
  minio_data:
  prometheus_data:
  grafana_data:
  airflow_logs:
  elasticsearch_data:
  spark_checkpoints:
  influxdb_data:
