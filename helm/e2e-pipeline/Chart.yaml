apiVersion: v2
name: e2e-pipeline
description: Enterprise E2E Data Pipeline - Batch, Streaming, Warehouse, ML, Monitoring
version: 1.0.0
appVersion: "2.0.0"
type: application
keywords:
  - data-pipeline
  - airflow
  - spark
  - kafka
  - snowflake
  - mlflow
home: https://github.com/hoangsonww/End-to-End-Data-Pipeline
maintainers:
  - name: Son Nguyen
    url: https://github.com/hoangsonww

dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mysql
    version: "11.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: mongodb
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  - name: kafka
    version: "28.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: minio
    version: "14.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: grafana
    version: "8.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: prometheus
    version: "25.x.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: elasticsearch
    version: "8.x.x"
    repository: https://helm.elastic.co
    condition: elasticsearch.enabled
