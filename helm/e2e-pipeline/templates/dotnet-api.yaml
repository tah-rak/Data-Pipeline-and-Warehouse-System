{{- if .Values.dotnetApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-api
  namespace: {{ include "e2e-pipeline.namespace" . }}
  labels:
    app: dotnet-api
    tier: api
    {{- include "e2e-pipeline.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dotnetApi.replicas }}
  selector:
    matchLabels:
      app: dotnet-api
  template:
    metadata:
      labels:
        app: dotnet-api
        tier: api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dotnet-api
          image: {{ include "e2e-pipeline.image" (dict "global" .Values.global "repository" .Values.dotnetApi.image.repository "tag" .Values.dotnetApi.image.tag) }}
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: pipeline-config
            - secretRef:
                name: pipeline-secrets
          resources: {{- toYaml .Values.dotnetApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-api
  namespace: {{ include "e2e-pipeline.namespace" . }}
spec:
  selector:
    app: dotnet-api
  ports:
    - port: {{ .Values.dotnetApi.service.port }}
      targetPort: 80
  type: {{ .Values.dotnetApi.service.type }}
{{- if .Values.dotnetApi.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dotnet-api-ingress
  namespace: {{ include "e2e-pipeline.namespace" . }}
  annotations:
    {{- if .Values.dotnetApi.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.dotnetApi.ingress.className }}
    {{- end }}
spec:
  rules:
    - host: {{ .Values.dotnetApi.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dotnet-api
                port:
                  number: {{ .Values.dotnetApi.service.port }}
  {{- if .Values.dotnetApi.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.dotnetApi.ingress.host }}
      secretName: dotnet-api-tls
  {{- end }}
{{- end }}
{{- end }}
