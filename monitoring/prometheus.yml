global:
  scrape_interval: 15s
  evaluation_interval: 10s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          tier: "monitoring"

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
          tier: "monitoring"

  - job_name: "dotnet-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["dotnet-api:80"]
        labels:
          service: "dotnet-api"
          tier: "api"

  - job_name: "spark-master"
    metrics_path: /metrics/json
    static_configs:
      - targets: ["spark-master:8080"]
        labels:
          service: "spark-master"
          tier: "processing"

  - job_name: "airflow"
    metrics_path: /health
    static_configs:
      - targets: ["airflow-webserver:8080"]
        labels:
          service: "airflow"
          tier: "orchestration"

  - job_name: "mlflow"
    metrics_path: /health
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: "mlflow"
          tier: "ml"

  - job_name: "elasticsearch"
    metrics_path: /_cluster/health
    static_configs:
      - targets: ["elasticsearch:9200"]
        labels:
          service: "elasticsearch"
          tier: "monitoring"

  - job_name: "minio"
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
        labels:
          service: "minio"
          tier: "storage"

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: "redis"
          tier: "cache"
